<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arenix — Beach Volleyball Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Dark palette (primary) */
    --d-bg: #0F1923;
    --d-surface: #1A2734;
    --d-alt: #243447;
    --d-accent: #F5A623;
    --d-free: #00BCD4;
    --d-ok: #2ECC71;
    --d-err: #E74C3C;
    --d-text: #E8ECF1;
    --d-dim: #7A8EA0;
    --d-line: #2A3A4A;
    --d-shell: #080E14;

    /* Light palette */
    --l-bg: #F5F6F8;
    --l-surface: #FFFFFF;
    --l-alt: #EDF0F4;
    --l-accent: #E8850C;
    --l-free: #0891B2;
    --l-ok: #16A34A;
    --l-err: #DC2626;
    --l-text: #1A1D23;
    --l-dim: #6B7280;
    --l-line: #E2E5EB;
    --l-shell: #E8EBF0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--shell);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s ease;
  }
  body.dark  { background: var(--d-shell); color: var(--d-text); }
  body.light { background: var(--l-shell); color: var(--l-text); }

  .display { font-family: 'Bebas Neue', Impact, sans-serif; letter-spacing: 0.5px; }
  .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* hide scrollbars inside phone */
  .phone-scroll::-webkit-scrollbar { width: 0; }
  .phone-scroll { scrollbar-width: none; }

  /* fade/slide transitions */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .route-enter { animation: fadeIn 0.22s ease-out both; }

  @keyframes sheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-enter { animation: sheetIn 0.28s cubic-bezier(.2,.8,.2,1) both; }

  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-enter { animation: overlayIn 0.2s ease-out both; }

  @keyframes popIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pop-enter { animation: popIn .25s cubic-bezier(.2,.9,.3,1.1) both; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    50% { box-shadow: 0 0 0 6px transparent; opacity: 0.6; }
  }
  .dot-pulse { animation: pulse 1.6s ease-in-out infinite; }

  /* buttons reset */
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* tap feedback */
  .tap { transition: transform .12s ease, opacity .12s ease; }
  .tap:active { transform: scale(.97); opacity: .85; }

  /* Notch phone frame */
  .notch-phone {
    width: 390px; height: 820px;
    border-radius: 54px;
    position: relative;
    padding: 14px;
    box-shadow: 0 40px 90px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.02);
  }
  body.dark .notch-phone  { background: #000; box-shadow: 0 40px 90px rgba(0,0,0,0.55), 0 0 0 2px #1a1a1a; }
  body.light .notch-phone { background: #1a1a1a; box-shadow: 0 40px 90px rgba(0,0,0,0.25); }
  .notch-phone > .screen {
    width: 100%; height: 100%;
    border-radius: 42px;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .notch {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px; background: #000; border-radius: 18px;
    z-index: 70;
  }
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; border-radius: 3px; z-index: 65;
  }

  /* workspace bg (speckled beach texture via radial gradients) */
  .workspace {
    min-height: 100vh;
    padding: 32px 24px 80px;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(245,166,35,0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,188,212,0.05), transparent 40%);
  }
</style>

<!-- EDITMODE: tweakable defaults -->
